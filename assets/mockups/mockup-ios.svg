<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" fill="none">
  <defs>
    <linearGradient id="iosGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00B69B"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- Ambient soft background -->
  <rect x="10" y="10" width="580" height="360" rx="10" fill="#0D1526"/>

  <!-- Two phones side by side -->

  <!-- Phone 1 (left, primary) -->
  <g transform="translate(140, 30)">
    <rect x="0" y="0" width="150" height="320" rx="22" fill="#17203A" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- notch -->
    <rect x="55" y="6" width="40" height="6" rx="3" fill="#0D1526"/>

    <!-- status bar -->
    <text x="14" y="30" font-family="Inter, sans-serif" font-size="8" fill="#94A3B8" font-weight="600">9:41</text>

    <!-- title -->
    <text x="14" y="58" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#E8EDF5">This week</text>

    <!-- day pills -->
    <g font-family="Inter, sans-serif" font-size="8" font-weight="500">
      <rect x="14" y="70" width="22" height="24" rx="6" fill="url(#iosGrad)"/>
      <text x="25" y="82" fill="#0D1526" text-anchor="middle">MON</text>
      <text x="25" y="91" fill="#0D1526" font-size="9" font-weight="700" text-anchor="middle">21</text>

      <rect x="40" y="70" width="22" height="24" rx="6" fill="#0D1526"/>
      <text x="51" y="82" fill="#94A3B8" text-anchor="middle">TUE</text>
      <text x="51" y="91" fill="#E8EDF5" font-size="9" font-weight="700" text-anchor="middle">22</text>

      <rect x="66" y="70" width="22" height="24" rx="6" fill="#0D1526"/>
      <text x="77" y="82" fill="#94A3B8" text-anchor="middle">WED</text>
      <text x="77" y="91" fill="#E8EDF5" font-size="9" font-weight="700" text-anchor="middle">23</text>

      <rect x="92" y="70" width="22" height="24" rx="6" fill="#0D1526"/>
      <text x="103" y="82" fill="#94A3B8" text-anchor="middle">THU</text>
      <text x="103" y="91" fill="#E8EDF5" font-size="9" font-weight="700" text-anchor="middle">24</text>

      <rect x="118" y="70" width="22" height="24" rx="6" fill="#0D1526"/>
      <text x="129" y="82" fill="#94A3B8" text-anchor="middle">FRI</text>
      <text x="129" y="91" fill="#E8EDF5" font-size="9" font-weight="700" text-anchor="middle">25</text>
    </g>

    <!-- Class cards -->
    <g font-family="Inter, sans-serif">
      <rect x="14" y="108" width="122" height="42" rx="8" fill="#0D1526"/>
      <rect x="14" y="108" width="3" height="42" rx="1.5" fill="url(#iosGrad)"/>
      <text x="22" y="122" font-size="9" fill="#94A3B8">7:00 AM</text>
      <text x="22" y="135" font-size="10" font-weight="600" fill="#E8EDF5">Morning Flow</text>
      <text x="22" y="146" font-size="8" fill="#94A3B8">with Enjy · 12 spots</text>

      <rect x="14" y="158" width="122" height="42" rx="8" fill="#0D1526"/>
      <rect x="14" y="158" width="3" height="42" rx="1.5" fill="url(#iosGrad)"/>
      <text x="22" y="172" font-size="9" fill="#94A3B8">10:00 AM</text>
      <text x="22" y="185" font-size="10" font-weight="600" fill="#E8EDF5">Vinyasa</text>
      <text x="22" y="196" font-size="8" fill="#94A3B8">with Nada · 8 spots</text>

      <rect x="14" y="208" width="122" height="42" rx="8" fill="#0D1526"/>
      <rect x="14" y="208" width="3" height="42" rx="1.5" fill="url(#iosGrad)"/>
      <text x="22" y="222" font-size="9" fill="#94A3B8">6:00 PM</text>
      <text x="22" y="235" font-size="10" font-weight="600" fill="#E8EDF5">Restorative</text>
      <text x="22" y="246" font-size="8" fill="#94A3B8">with Enjy · 5 spots</text>

      <rect x="14" y="258" width="122" height="42" rx="8" fill="#0D1526"/>
      <rect x="14" y="258" width="3" height="42" rx="1.5" fill="#EAB308"/>
      <text x="22" y="272" font-size="9" fill="#94A3B8">8:00 PM</text>
      <text x="22" y="285" font-size="10" font-weight="600" fill="#E8EDF5">Yin Yoga</text>
      <text x="22" y="296" font-size="8" fill="#EAB308">Full · Waitlist</text>
    </g>
  </g>

  <!-- Phone 2 (right, offset) -->
  <g transform="translate(310, 60)" opacity="0.85">
    <rect x="0" y="0" width="150" height="320" rx="22" fill="#17203A" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="55" y="6" width="40" height="6" rx="3" fill="#0D1526"/>

    <!-- Booking confirmation view -->
    <circle cx="75" cy="90" r="28" fill="url(#iosGrad)" opacity="0.15"/>
    <circle cx="75" cy="90" r="20" fill="url(#iosGrad)"/>
    <path d="M 66 90 L 73 97 L 84 84" stroke="#0D1526" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="75" y="145" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#E8EDF5" text-anchor="middle">Booked!</text>
    <text x="75" y="162" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Morning Flow</text>
    <text x="75" y="174" font-family="Inter, sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">Mon 21 · 7:00 AM</text>

    <rect x="20" y="200" width="110" height="42" rx="8" fill="#0D1526"/>
    <text x="30" y="216" font-family="Inter, sans-serif" font-size="8" fill="#94A3B8">Class credits</text>
    <text x="30" y="234" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#E8EDF5">7 left</text>

    <rect x="20" y="270" width="110" height="30" rx="15" fill="url(#iosGrad)"/>
    <text x="75" y="290" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#0D1526" text-anchor="middle">Add to calendar</text>
  </g>
</svg>
